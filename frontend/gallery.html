<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gallery – Cartoonify</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="css/style.css" rel="stylesheet">
    <script src="js/theme.js"></script>
</head>

<body class="app-page">

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">

        <!-- LOGO -->

        <div class="sidebar-brand">
            <a href="/" class="brand-logo text-decoration-none">
                <img src="images/logo.png" class="brand-logo-img">
                <span class="brand-text">Cartoonify</span>
            </a>
        </div>

        <!-- NAVIGATION -->

        <nav class="sidebar-nav">

            <!-- MAIN -->
            <p class="sidebar-heading">Main</p>

            <a href="dashboard.html" class="sidebar-link">
                <i class="bi bi-grid-fill"></i> Dashboard
            </a>

            <a href="upload.html" class="sidebar-link">
                <i class="bi bi-image"></i> Image Editor
            </a>

            <a href="video_editor.html" class="sidebar-link">
                <i class="bi bi-camera-video"></i> Video Editor
            </a>

            <a href="sticker.html" class="sidebar-link">
                <i class="bi bi-emoji-smile"></i> Sticker Generator
            </a>

            <a href="gallery.html" class="sidebar-link">
                <i class="bi bi-collection"></i> My Gallery
            </a>

            <a href="blog.html" class="sidebar-link">
                <i class="bi bi-journal-text"></i> Blog
            </a>

            <hr class="sidebar-divider">

            <!-- GUIDE -->
            <p class="sidebar-heading">Guide</p>

            <a href="howto.html" class="sidebar-link">
                <i class="bi bi-question-circle"></i> How to Use
            </a>

            <a href="about.html" class="sidebar-link">
                <i class="bi bi-info-circle"></i> About
            </a>

            <hr class="sidebar-divider">

        </nav>


    </aside>

    <!-- CHATBOT -->
    <!-- CHAT BUTTON -->
    <button id="chatToggleBtn" class="chat-toggle-btn" onclick="toggleChat()">
        <i class="bi bi-chat-dots-fill"></i>
        <span id="chatHint">Hi, I'm Pixie 👋 Need help?</span>
    </button>

    <div id="chatbot" class="chatbot">

        <div class="chat-header">
            Cartoonify Assistant 🤖
        </div>

        <div id="chatMessages"></div>

        <div class="chat-input-row">

            <input id="chatInput" placeholder="Ask about styles, editing, stickers..." />

            <button onclick="sendChat()">
                <i class="bi bi-send"></i>
            </button>

        </div>

    </div>

    <!-- MAIN -->

    <main class="app-main">

        <header class="app-topbar">

            <div class="topbar-left">

                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>

                <h1 class="page-title">Gallery</h1>

            </div>

            <div class="topbar-right">

                <span class="badge-pill small-pill">
                    <i class="bi bi-circle-fill text-success me-1"></i>
                    AI Online
                </span>

                <div class="dropdown">

                    <img id="topbarAvatar" src="https://ui-avatars.com/api/?name=User&background=7c3aed&color=fff"
                        class="rounded-circle dropdown-toggle" width="36" data-bs-toggle="dropdown"
                        aria-expanded="false" style="cursor:pointer">

                    <ul class="dropdown-menu dropdown-menu-end profile-menu">

                        <li class="dropdown-header" id="userName">User</li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>
                            <a class="dropdown-item" href="/profile.html">
                                <i class="bi bi-person"></i> Profile
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/settings.html">
                                <i class="bi bi-gear"></i> Settings
                            </a>
                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>
                            <a class="dropdown-item text-danger" href="#" id="logoutBtn">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </a>
                        </li>

                    </ul>

                </div>
            </div>
        </header>

        <div class="app-content">

            <!-- TABS -->

            <ul class="nav nav-pills gallery-tabs mb-4">

                <li class="nav-item">
                    <button class="nav-link gallery-tab active" onclick="switchTab('images')">
                        <i class="bi bi-image me-2"></i>
                        Images
                        <span class="tab-count" id="imageCount">0</span>
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link gallery-tab" onclick="switchTab('videos')">
                        <i class="bi bi-camera-video me-2"></i>
                        Videos
                        <span class="tab-count" id="videoCount">0</span>
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link gallery-tab" onclick="switchTab('stickers')">
                        <i class="bi bi-emoji-smile me-2"></i>
                        Stickers
                        <span class="tab-count" id="stickerCount">0</span>
                    </button>
                </li>

            </ul>

            <!-- IMAGES -->

            <div id="imagesPane">

                <div class="row g-4" id="imagesGrid">

                    <div class="col-12 text-center py-5">

                        <div class="spinner-border text-purple"></div>
                        <p class="mt-2 text-muted">Loading images...</p>

                    </div>

                </div>

            </div>

            <!-- VIDEOS -->

            <div id="videosPane" class="d-none">

                <div class="row g-4" id="videosGrid">

                    <div class="col-12 text-center py-5">

                        <div class="spinner-border text-purple"></div>
                        <p class="mt-2 text-muted">Loading videos...</p>

                    </div>

                </div>

            </div>

            <!-- STICKERS -->

            <div id="stickersPane" class="d-none">

                <div class="row g-4" id="stickersGrid">

                    <div class="col-12 text-center py-5">

                        <div class="spinner-border text-purple"></div>
                        <p class="mt-2 text-muted">Loading stickers...</p>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/gallery.js"></script>

    <script>

        requireAuth()
        function toggleChat() {

            const bot = document.getElementById("chatbot")
            const hint = document.getElementById("chatHint")

            bot.classList.toggle("chat-open")

            if (bot.classList.contains("chat-open")) {
                hint.style.display = "none"
            } else {
                hint.style.display = "inline"
            }
        }
        function initChatbot() {

            const chat = document.getElementById("chatMessages")

            if (!chat) return

            chat.innerHTML = `
    <p><b>Pixie 🤖:</b><br>
    Hi! I'm <b>Pixie</b>.<br>
    I can help you with:
    <br>• Choosing cartoon styles
    <br>• Image editing
    <br>• Video cartoonification
    <br>• Sticker generation
    </p>
    `
        }

        function setActiveSidebar() {

            const links = document.querySelectorAll(".sidebar-link");

            // current page nikalna (e.g. dashboard.html)
            let currentPage = window.location.pathname.split("/").pop();

            // agar empty hai (like "/") to default dashboard
            if (currentPage === "" || currentPage === "/") {
                currentPage = "dashboard.html";
            }

            links.forEach(link => {

                const linkPage = link.getAttribute("href");

                // match karte hi active class add
                if (linkPage === currentPage) {
                    link.classList.add("active");
                }

            });
        }

        // page load hone ke baad run karo
        document.addEventListener("DOMContentLoaded", setActiveSidebar);
        async function loadUserTopbar() {

            try {
                const res = await fetch("https://cartoonify-backend-ordt.onrender.com/api/auth/me", {
                    headers: {
                        "Authorization": "Bearer " + localStorage.getItem("cartoonify_token")
                    }
                })

                const data = await res.json()

                if (data.success && data.user) {

                    const user = data.user

                    const avatar =
                        `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=7c3aed&color=fff`

                    const avatarEl = document.getElementById("topbarAvatar")
                    const nameEl = document.getElementById("userName")

                    if (avatarEl) avatarEl.src = avatar
                    if (nameEl) nameEl.textContent = user.name

                    return
                }

            } catch (err) {
                console.log("API failed")
            }

            // fallback (optional)
            const stored = localStorage.getItem("cartoonify_user")

            if (!stored) return

            const user = JSON.parse(stored)

            const avatar =
                `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=7c3aed&color=fff`

            document.getElementById("topbarAvatar").src = avatar
            document.getElementById("userName").textContent = user.name
        }

        window.addEventListener("DOMContentLoaded", loadUserTopbar)
        /* TAB SWITCH */

        function switchTab(tab) {

            document.getElementById("imagesPane").classList.add("d-none")
            document.getElementById("videosPane").classList.add("d-none")
            document.getElementById("stickersPane").classList.add("d-none")

            document.querySelectorAll(".gallery-tab")
                .forEach(t => t.classList.remove("active"))

            if (tab === "images") {
                document.getElementById("imagesPane").classList.remove("d-none")
                document.querySelectorAll(".gallery-tab")[0].classList.add("active")
            }

            if (tab === "videos") {
                document.getElementById("videosPane").classList.remove("d-none")
                document.querySelectorAll(".gallery-tab")[1].classList.add("active")
            }

            if (tab === "stickers") {
                document.getElementById("stickersPane").classList.remove("d-none")
                document.querySelectorAll(".gallery-tab")[2].classList.add("active")
            }

        }

        async function sendChat() {

            const input = document.getElementById("chatInput")
            const message = input.value.trim()

            if (!message) return

            const chat = document.getElementById("chatMessages")

            chat.innerHTML += `<p><b>You:</b> ${message}</p>`

            input.value = ""

            const res = await fetch("https://cartoonify-backend-ordt.onrender.com/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            })

            const data = await res.json()

            chat.innerHTML += `<p><b>AI:</b> ${data.reply}</p>`

            chat.scrollTop = chat.scrollHeight
        } document.getElementById("chatInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") sendChat()
        })
        window.addEventListener("DOMContentLoaded", () => {
            loadUserTopbar()
            initChatbot()
        })

        /* LOGOUT */

        document.getElementById("logoutBtn").addEventListener("click", function () {

            localStorage.removeItem("cartoonify_token")
            localStorage.removeItem("cartoonify_user")

            window.location.href = "/login.html"

        })
    </script>

</body>

</html>
