<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sticker Generator – Cartoonify</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="css/style.css" rel="stylesheet">
    <script src="js/theme.js"></script>

</head>

<body class="app-page sticker-fix">


    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">

        <!-- LOGO -->

        <div class="sidebar-brand">
            <a href="/" class="brand-logo text-decoration-none">
                <img src="images/logo.png" class="brand-logo-img">
                <span class="brand-text">Cartoonify</span>
            </a>
        </div>

        <!-- NAVIGATION -->

        <nav class="sidebar-nav">

            <a href="dashboard.html" class="sidebar-link">
                <i class="bi bi-grid-fill"></i> Dashboard
            </a>

            <a href="upload.html" class="sidebar-link">
                <i class="bi bi-image"></i> Image Editor
            </a>

            <a href="video_editor.html" class="sidebar-link">
                <i class="bi bi-camera-video"></i> Video Editor
            </a>

            <a href="sticker.html" class="sidebar-link">
                <i class="bi bi-emoji-smile"></i> Sticker Generator
            </a>

            <a href="gallery.html" class="sidebar-link">
                <i class="bi bi-collection"></i> My Gallery
            </a>

            <a href="blog.html" class="sidebar-link">
                <i class="bi bi-journal-text"></i> Blog
            </a>

        </nav>



    </aside>


    <!-- MAIN -->

    <header class="app-topbar">

        <div class="topbar-left">

            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>

            <h1 class="page-title">Sticker Generator</h1>

        </div>

        <div class="topbar-right">

            <span class="badge-pill small-pill">
                <i class="bi bi-circle-fill text-success me-1"></i>
                AI Online
            </span>

            <div class="dropdown">

                <img id="topbarAvatar" src="https://ui-avatars.com/api/?name=User&background=7c3aed&color=fff"
                    class="rounded-circle dropdown-toggle" width="36" data-bs-toggle="dropdown" aria-expanded="false"
                    style="cursor:pointer">

                <ul class="dropdown-menu dropdown-menu-end profile-menu">

                    <li class="dropdown-header" id="userName">User</li>

                    <li>
                        <hr class="dropdown-divider">
                    </li>

                    <li>
                        <a class="dropdown-item" href="/profile.html">
                            <i class="bi bi-person"></i> Profile
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="/settings.html">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>

                    <li>
                        <hr class="dropdown-divider">
                    </li>

                    <li>
                        <a class="dropdown-item text-danger" href="#" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </li>

                </ul>

            </div>
        </div>
    </header>


    <div class="app-content">

        <div class="row g-4">


            <!-- LEFT PANEL -->

            <div class="col-lg-4">

                <div class="section-card mb-4">

                    <h5 class="mb-3">
                        <i class="bi bi-cloud-upload me-2"></i>
                        Upload Image
                    </h5>

                    <input type="file" id="imageInput" accept="image/*" class="form-control mb-3">

                    <div id="previewWrapper" style="position:relative">

                        <img id="previewImg" style="max-width:100%;border-radius:10px;display:none">

                        <div id="dragText" style="
                                position:absolute;
                                top:20px;
                                left:50%;
                                transform:translateX(-50%);
                                color:white;
                                font-weight:bold;
                                font-size:28px;
                                text-shadow:2px 2px 6px black;
                                cursor:move;
                                display:none;
                            ">

                            Sticker Text

                        </div>

                    </div>

                </div>


                <div class="section-card mb-4">

                    <h5 class="mb-3">
                        <i class="bi bi-chat-left-text me-2"></i>
                        Sticker Text
                    </h5>

                    <input type="text" id="stickerText" class="form-control mb-2" placeholder="Enter text for sticker">

                    <select id="textPosition" class="form-select">

                        <option value="top">Top</option>
                        <option value="bottom">Bottom</option>

                    </select>

                </div>


                <button class="btn btn-glow w-100" onclick="generateSticker()">

                    <i class="bi bi-magic me-2"></i>
                    Generate Sticker

                </button>

            </div>


            <!-- RIGHT PANEL -->

            <div class="col-lg-8">

                <div class="section-card text-center">

                    <h5 class="mb-4">

                        <i class="bi bi-emoji-smile me-2"></i>
                        Sticker Result

                    </h5>

                    <div id="resultPlaceholder">

                        <p class="text-muted">
                            Your sticker will appear here
                        </p>

                    </div>

                    <div id="resultContainer" class="d-none">

                        <img id="result" style="max-width:300px">

                        <div class="mt-4">

                            <button class="btn btn-glow me-2" onclick="downloadSticker()">

                                <i class="bi bi-download me-1"></i>
                                Download

                            </button>

                            <button class="btn btn-success" onclick="shareWhatsApp()">

                                <i class="bi bi-whatsapp me-1"></i>
                                WhatsApp

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <style>
        /* ===== STICKER PAGE FIX (FINAL CORRECT) ===== */

        .sticker-fix .app-topbar {
            position: fixed;
            top: 0;
            left: var(--sidebar-w);
            width: calc(100% - var(--sidebar-w));
            z-index: 1000;
        }

        /* ✅ THIS WAS MISSING */
        .sticker-fix .app-content {
            margin-top: var(--topbar-h);
            margin-left: var(--sidebar-w);
        }

        /* Make row full height */
        .sticker-fix .app-content .row {
            display: flex;
            align-items: stretch;
        }

        /* LEFT column */
        .sticker-fix .col-lg-4 {
            display: flex;
            flex-direction: column;
        }

        /* RIGHT column */
        .sticker-fix .col-lg-8 {
            display: flex;
        }

        /* RESULT CARD FULL HEIGHT */
        .sticker-fix .col-lg-8 .section-card {
            width: 100%;
            min-height: 350px;
            /* increase if needed */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* mobile fix */
        @media (max-width: 991.98px) {

            .sticker-fix .app-topbar {
                left: 0;
                width: 100%;
            }

            .sticker-fix .app-content {
                margin-left: 0;
            }

        }
    </style>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/sticker.js"></script>


    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open")
        }

        requireAuth()

        /* -------------------------------
           IMAGE PREVIEW
        --------------------------------*/

        document
            .getElementById("imageInput")
            .addEventListener("change", function () {

                const file = this.files[0]

                if (!file) return

                const reader = new FileReader()

                reader.onload = function (e) {

                    const img = document.getElementById("previewImg")

                    img.src = e.target.result
                    img.style.display = "block"

                }

                reader.readAsDataURL(file)

            })


        async function loadUserTopbar() {

            try {
                const res = await fetch("/api/auth/me", {
                    headers: {
                        "Authorization": "Bearer " + localStorage.getItem("cartoonify_token")
                    }
                })

                const data = await res.json()

                if (data.success && data.user) {

                    const user = data.user

                    const avatar =
                        `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=7c3aed&color=fff`

                    const avatarEl = document.getElementById("topbarAvatar")
                    const nameEl = document.getElementById("userName")

                    if (avatarEl) avatarEl.src = avatar
                    if (nameEl) nameEl.textContent = user.name

                    return
                }

            } catch (err) {
                console.log("API failed")
            }

            // fallback (optional)
            const stored = localStorage.getItem("cartoonify_user")

            if (!stored) return

            const user = JSON.parse(stored)

            const avatar =
                `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=7c3aed&color=fff`

            document.getElementById("topbarAvatar").src = avatar
            document.getElementById("userName").textContent = user.name
        }

        window.addEventListener("DOMContentLoaded", loadUserTopbar)
        /* -------------------------------
           LOGOUT
        --------------------------------*/

        document.getElementById("logoutBtn").addEventListener("click", function () {

            localStorage.removeItem("cartoonify_token")
            localStorage.removeItem("cartoonify_user")

            window.location.href = "/login.html"

        })

    </script>

</body>

</html>
