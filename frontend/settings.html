<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings – Cartoonify</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="../css/style.css" rel="stylesheet">
    <script src="/js/theme.js"></script>

</head>


<body class="app-page">

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">

        <!-- LOGO -->

        <div class="sidebar-brand">
            <a href="/" class="brand-logo text-decoration-none">
                <img src="images/logo.png" class="brand-logo-img">
                <span class="brand-text">Cartoonify</span>
            </a>
        </div>

        <!-- NAVIGATION -->

        <nav class="sidebar-nav">

            <a href="dashboard.html" class="sidebar-link">
                <i class="bi bi-grid-fill"></i> Dashboard
            </a>

            <a href="upload.html" class="sidebar-link">
                <i class="bi bi-image"></i> Image Editor
            </a>

            <a href="video_editor.html" class="sidebar-link">
                <i class="bi bi-camera-video"></i> Video Editor
            </a>

            <a href="sticker.html" class="sidebar-link">
                <i class="bi bi-emoji-smile"></i> Sticker Generator
            </a>

            <a href="gallery.html" class="sidebar-link">
                <i class="bi bi-collection"></i> My Gallery
            </a>

            <a href="blog.html" class="sidebar-link">
                <i class="bi bi-journal-text"></i> Blog
            </a>

        </nav>

    </aside>


    <!-- MAIN -->

    <main class="app-main">

        <header class="app-topbar">

            <div class="topbar-left">

                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>

                <h1 class="page-title">Settings</h1>

            </div>

            <div class="topbar-right">

                <span class="badge-pill small-pill">
                    <i class="bi bi-circle-fill text-success me-1"></i>
                    AI Online
                </span>

                <div class="dropdown">

                    <img id="topbarAvatar" src="https://ui-avatars.com/api/?name=User&background=7c3aed&color=fff"
                        class="rounded-circle dropdown-toggle" width="36" data-bs-toggle="dropdown"
                        aria-expanded="false" style="cursor:pointer">

                    <ul class="dropdown-menu dropdown-menu-end profile-menu">

                        <li class="dropdown-header" id="userName">User</li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>
                            <a class="dropdown-item" href="/profile.html">
                                <i class="bi bi-person"></i> Profile
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/settings.html">
                                <i class="bi bi-gear"></i> Settings
                            </a>
                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>
                            <a class="dropdown-item text-danger" href="#" id="logoutBtn">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </a>
                        </li>

                    </ul>

                </div>
            </div>
        </header>


        <div class="app-content">

            <div class="row g-4">


                <!-- PROFILE SETTINGS -->

                <div class="col-lg-6">

                    <div class="section-card">

                        <h5 class="mb-4">
                            <i class="bi bi-person-circle me-2"></i>
                            Profile Settings
                        </h5>

                        <div class="text-center mb-4">

                            <img id="profileAvatar"
                                src="https://ui-avatars.com/api/?name=User&background=7c3aed&color=fff&size=128"
                                class="profile-avatar mb-2">

                            <p class="text-muted small">Profile Avatar</p>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Name</label>

                            <input id="nameInput" class="form-control form-control-dark" placeholder="Your name">

                        </div>

                        <div class="mb-3">
                            <label class="form-label">New Password</label>

                            <input type="password" id="passwordInput" class="form-control form-control-dark"
                                placeholder="Leave empty to keep current password">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>

                            <input type="password" id="confirmPassword" class="form-control form-control-dark"
                                placeholder="Re-enter new password">
                        </div>

                        <button class="btn btn-glow w-100" onclick="updateProfile()">
                            <i class="bi bi-check-circle"></i>
                            Update Profile
                        </button>

                        <p id="statusMsg" class="mt-3 text-muted"></p>

                    </div>

                </div>


                <!-- PREFERENCES -->

                <div class="col-lg-6">

                    <div class="section-card">

                        <h5 class="mb-4">
                            <i class="bi bi-sliders me-2"></i>
                            Preferences
                        </h5>

                        <div class="mb-4">

                            <label class="form-label">Theme</label>

                            <select id="themeSelect" class="form-control form-control-dark">

                                <option value="dark">Dark Theme</option>
                                <option value="light">Light Theme</option>

                            </select>

                        </div>

                        <div class="form-check form-switch mb-3">

                            <input id="emailNotify" class="form-check-input" type="checkbox">

                            <label class="form-check-label">
                                Enable Email Notifications
                            </label>

                        </div>

                        <div class="form-check form-switch mb-3">

                            <input id="processAlert" class="form-check-input" type="checkbox">

                            <label class="form-check-label">
                                Enable Processing Alerts
                            </label>

                        </div>

                        <div class="form-check form-switch mb-3">

                            <input id="autoSave" class="form-check-input" type="checkbox">

                            <label class="form-check-label">
                                Auto Save Generated Images
                            </label>

                        </div>

                        <button class="btn btn-ghost w-100" onclick="savePreferences()">
                            <i class="bi bi-save"></i>
                            Save Preferences
                        </button>

                    </div>

                </div>


                <!-- ACCOUNT INFO -->

                <div class="col-lg-12">

                    <div class="section-card">

                        <h5 class="mb-4">
                            <i class="bi bi-shield-lock me-2"></i>
                            Account Information
                        </h5>

                        <div class="row text-center">

                            <div class="col-md-4">
                                <h3 id="statImages" class="stat-number">0</h3>
                                <p class="text-muted">Images Generated</p>
                            </div>

                            <div class="col-md-4">
                                <h3 id="statVideos" class="stat-number">0</h3>
                                <p class="text-muted">Videos Generated</p>
                            </div>

                            <div class="col-md-4">
                                <h3 id="statStickers" class="stat-number">0</h3>
                                <p class="text-muted">Stickers Created</p>
                            </div>

                        </div>

                        <hr class="my-4">

                        <div class="text-center">

                            <button onclick="deleteAccount()" class="btn btn-danger">
                                <i class="bi bi-trash"></i> Delete Account
                            </button>

                        </div>

                    </div>

                </div>


            </div>

        </div>

    </main>

    <style>
        /* ============================= */
        /* ✅ LAYOUT FIX (EQUAL HEIGHT) */
        /* ============================= */

        .app-content .row {
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
        }

        .app-content .col-lg-6 {
            display: flex;
        }


        /* ============================= */
        /* ✅ CARD DESIGN */
        /* ============================= */

        .section-card {
            width: 100%;
            height: 100%;
            padding: 24px;

            display: flex;
            flex-direction: column;

            border-radius: 16px;
            background: var(--card-bg, #ffffff);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }


        /* ============================= */
        /* ✅ SPACING FIX */
        /* ============================= */

        .section-card>div,
        .section-card>input,
        .section-card>select,
        .section-card>button {
            margin-bottom: 12px;
        }

        .section-card>*:last-child {
            margin-bottom: 0;
        }


        /* ============================= */
        /* ✅ BUTTON BOTTOM ALIGN */
        /* ============================= */

        .section-card button {
            margin-top: auto;
        }


        /* ============================= */
        /* ✅ SWITCH / FORM SPACING */
        /* ============================= */

        .form-check {
            padding: 8px 0;
        }

        .form-label {
            font-weight: 500;
        }


        /* ============================= */
        /* ✅ INPUT STYLING (BETTER UI) */
        /* ============================= */

        .form-control,
        .form-select {
            border-radius: 10px;
            padding: 10px;
        }


        /* ============================= */
        /* ✅ LIGHT THEME FIX */
        /* ============================= */

        body.light-theme .section-card {
            background: #ffffff;
            color: #1e293b;
        }

        body.light-theme .form-control,
        body.light-theme .form-select {
            background: #f8fafc;
            color: #1e293b;
        }

        /* Fix toggle alignment */
        .form-check {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }

        /* Prevent toggle overflow */
        .form-check-input {
            margin-left: 0 !important;
        }

        /* Fix label spacing */
        .form-check-label {
            margin-left: 8px;
        }

        /* ============================= */
        /* ✅ MOBILE RESPONSIVE */
        /* ============================= */

        @media (max-width: 991.98px) {

            .app-content .row {
                display: block;
            }

            .app-content .col-lg-6 {
                display: block;
            }

            .section-card {
                margin-bottom: 16px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/auth.js"></script>

    <script>

        requireAuth()


        // ---------------- LOAD USER ----------------

        async function loadUser() {

            const res = await apiGet('/api/auth/me')

            if (res.success) {

                document.getElementById("nameInput").value = res.user.name

            }

        }


        // ---------------- UPDATE PROFILE ----------------

        async function updateProfile() {

            const name = document.getElementById("nameInput").value
            const password = document.getElementById("passwordInput").value
            const confirm = document.getElementById("confirmPassword").value

            // ✅ validation
            if (password && password !== confirm) {
                document.getElementById("statusMsg").textContent =
                    "❌ Passwords do not match"
                document.getElementById("statusMsg").style.color = "red"
                return
            }

            const token = localStorage.getItem("cartoonify_token")

            const res = await fetch("/api/auth/update", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    name: name,
                    password: password
                })
            })

            const data = await res.json()

            if (data.success) {
                document.getElementById("statusMsg").textContent =
                    "✅ Profile updated successfully"
                document.getElementById("statusMsg").style.color = "#7c3aed"
            } else {
                document.getElementById("statusMsg").textContent =
                    "❌ Update failed"
                document.getElementById("statusMsg").style.color = "red"
            }
        }

        async function loadStats() {

            const res = await apiGet("/api/auth/stats")

            if (res.success) {

                document.getElementById("statImages").textContent =
                    res.stats.total_images || 0

                document.getElementById("statVideos").textContent =
                    res.stats.total_videos || 0

                document.getElementById("statStickers").textContent =
                    res.stats.total_stickers || 0

            }

        }

        // ---------------- SAVE PREFERENCES ----------------

        function savePreferences() {

            const theme = document.getElementById("themeSelect").value
            const email = document.getElementById("emailNotify").checked
            const alerts = document.getElementById("processAlert").checked
            const autosave = document.getElementById("autoSave").checked

            localStorage.setItem("cartoonify_theme", theme)
            localStorage.setItem("pref_email", email)
            localStorage.setItem("pref_alerts", alerts)
            localStorage.setItem("pref_autosave", autosave)

            applyTheme(theme)

            alert("Preferences saved")

        }


        // ---------------- LOAD PREFERENCES ----------------

        function loadPreferences() {

            const theme = localStorage.getItem("cartoonify_theme") || "dark"

            document.getElementById("themeSelect").value = theme

            applyTheme(theme)

            document.getElementById("emailNotify").checked =
                localStorage.getItem("pref_email") === "true"

            document.getElementById("processAlert").checked =
                localStorage.getItem("pref_alerts") === "true"

            document.getElementById("autoSave").checked =
                localStorage.getItem("pref_autosave") === "true"

        }


        // ---------------- APPLY THEME ----------------

        function applyTheme(theme) {

            if (theme === "light") {
                document.body.classList.add("light-theme")
            } else {
                document.body.classList.remove("light-theme")
            }

        }


        // ---------------- DELETE ACCOUNT ----------------

        async function deleteAccount() {

            if (!confirm("Are you sure you want to delete your account?")) {
                return
            }

            const token = localStorage.getItem("cartoonify_token")

            const res = await fetch("/api/auth/delete", {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            })

            const data = await res.json()

            if (data.success) {

                localStorage.removeItem("cartoonify_token")
                localStorage.removeItem("cartoonify_user")

                window.location.href = "/login.html"

            } else {

                alert("Failed to delete account")

            }

        }
        async function loadUserTopbar() {

            try {
                const res = await fetch("/api/auth/me", {
                    headers: {
                        "Authorization": "Bearer " + localStorage.getItem("cartoonify_token")
                    }
                })

                const data = await res.json()

                if (data.success && data.user) {

                    const user = data.user

                    const avatar =
                        `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=7c3aed&color=fff`

                    const avatarEl = document.getElementById("topbarAvatar")
                    const nameEl = document.getElementById("userName")

                    if (avatarEl) avatarEl.src = avatar
                    if (nameEl) nameEl.textContent = user.name

                    return
                }

            } catch (err) {
                console.log("API failed")
            }

            // fallback (optional)
            const stored = localStorage.getItem("cartoonify_user")

            if (!stored) return

            const user = JSON.parse(stored)

            const avatar =
                `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=7c3aed&color=fff`

            document.getElementById("topbarAvatar").src = avatar
            document.getElementById("userName").textContent = user.name
        }

        window.addEventListener("DOMContentLoaded", loadUserTopbar)

        document.getElementById("logoutBtn").addEventListener("click", function () {

            localStorage.removeItem("cartoonify_token")
            localStorage.removeItem("cartoonify_user")

            window.location.href = "/login.html"

        })
        loadUser()
        loadPreferences()
        loadStats()

    </script>

</body>

</html>
